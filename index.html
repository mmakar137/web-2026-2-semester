<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Simon Says</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Simon Says</h2>
<p id="info">Нажми Start</p>
<button onclick="start()">Start</button>

<div id="game">
  <div class="btn" id="b0" onclick="clickBtn(0)"></div>
  <div class="btn" id="b1" onclick="clickBtn(1)"></div>
  <div class="btn" id="b2" onclick="clickBtn(2)"></div>
  <div class="btn" id="b3" onclick="clickBtn(3)"></div>
</div>

<script src="script.js"></script>
</body>
</html>
