<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кубики Бали</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game">
        <h1>Избавься от чисел</h1>
        
        <div id="setup">
            <label>Игроков (2-6):</label>
            <input type="number" id="playerCount" min="2" max="6" value="2">
            <button id="startBtn">Старт</button>
        </div>

        <div id="gameArea" style="display: none;">
            <div id="turnIndicator"></div>
            <div>
                <span class="dice" id="dice1">⚀</span>
                <span class="dice" id="dice2">⚀</span>
                <button id="rollBtn">Бросить</button>
            </div>
            <div id="options"></div>
            <div id="playersContainer"></div>
            <button id="resetBtn">Новая игра</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
